<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Librarian Dashboard - Mobile</title>
  <link rel="stylesheet" href="librarian-mobile.css?v=20240312">
</head>
<body>
  
  <!-- Login Screen -->
  <div id="mobile-login-screen" class="mobile-login-screen">
    <div class="mobile-login-container">
      <div class="mobile-login-header">
        <div class="mobile-login-icon">📚</div>
        <h1>Librarian Dashboard</h1>
        <p>Mobile Access</p>
      </div>
      <form id="mobile-login-form" class="mobile-login-form">
        <div class="mobile-input-group">
          <input type="text" id="mobile-username" placeholder="Enter your name" required>
        </div>
        <div class="mobile-input-group">
          <input type="password" id="mobile-password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="mobile-login-btn">Login</button>
        <div id="mobile-login-error" class="mobile-login-error" style="display: none;"></div>
      </form>
    </div>
  </div>

  <!-- Main Dashboard (hidden until login) -->
  <div id="mobile-dashboard-content" style="display: none;">
  
  <!-- Header -->
  <header class="mobile-header">
    <div class="header-content">
      <h1>📚 Dashboard</h1>
      <button class="refresh-btn" onclick="loadNotifications()" id="refresh-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
        </svg>
      </button>
    </div>
    <div class="header-meta">
      <span class="status-badge">
        <span class="status-dot"></span>
        Auto-refresh: 2s
      </span>
    </div>
  </header>

  <!-- Stats Cards -->
  <div class="stats-container">
    <div class="stat-card">
      <div class="stat-icon">💬</div>
      <div class="stat-info">
        <div class="stat-value" id="active-count">0</div>
        <div class="stat-label">Active</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⏳</div>
      <div class="stat-info">
        <div class="stat-value" id="pending-count">0</div>
        <div class="stat-label">Pending</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📨</div>
      <div class="stat-info">
        <div class="stat-value" id="message-count">0</div>
        <div class="stat-label">Messages</div>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <select id="status-filter" onchange="filterConversations()">
      <option value="all">All Status</option>
      <option value="human">⏳ Waiting</option>
      <option value="responded">✅ Responded</option>
      <option value="bot">🤖 Bot</option>
      <option value="viewed">👁️ Viewed</option>
      <option value="closed">🔒 Closed</option>
    </select>
    <select id="sort-by" onchange="filterConversations()">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
    </select>
  </div>

  <!-- Conversations List -->
  <div class="conversations-container" id="conversation-list">
    <div class="empty-state">
      <div class="empty-icon">💬</div>
      <p>No conversations yet</p>
    </div>
  </div>

  <!-- Conversation Modal -->
  <div class="modal" id="conversation-modal">
    <div class="modal-header">
      <button class="back-btn" onclick="closeModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="modal-title" id="modal-title">
        <h3 id="modal-session-id">Conversation</h3>
        <span class="modal-status" id="modal-status"></span>
      </div>
      <button class="menu-btn" onclick="toggleActionMenu()">⋮</button>
    </div>

    <!-- Action Menu -->
    <div class="action-menu" id="action-menu">
      <button class="action-menu-item warn" onclick="sendWarning(); toggleActionMenu();">
        ⚠️ Warn (10s countdown)
      </button>
      <button class="action-menu-item danger" onclick="endSession(); toggleActionMenu();">
        🔒 End Session
      </button>
    </div>

    <div class="modal-messages" id="modal-messages">
      <!-- Messages will be loaded here -->
    </div>

    <!-- Quick Replies -->
    <div class="quick-replies" id="quick-replies">
      <div class="quick-replies-header">
        <span>💬 Quick Replies</span>
        <button class="toggle-replies-btn" onclick="toggleQuickReplies()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6"/>
          </svg>
        </button>
      </div>
      <div class="quick-replies-content" id="quick-replies-content">
        <!-- Quick reply buttons will be loaded here -->
      </div>
    </div>

    <div class="modal-input">
      <input type="file" id="mobile-librarian-file-input" accept="image/*,.pdf,.doc,.docx" style="display: none;" aria-label="Upload file">
      <div id="mobile-librarian-file-preview" class="file-preview-mobile" style="display: none;">
        <div class="file-preview-content-mobile">
          <img id="mobile-librarian-file-preview-img" style="display: none; max-width: 100px; max-height: 100px; border-radius: 8px;" alt="File preview">
          <div id="mobile-librarian-file-preview-info" class="file-info-mobile">
            <span class="file-icon-mobile">📄</span>
            <span class="file-name-mobile"></span>
            <span class="file-size-mobile"></span>
          </div>
          <button id="mobile-librarian-remove-file-btn" class="remove-file-btn-mobile" aria-label="Remove file">×</button>
        </div>
      </div>
      <div style="display: flex; gap: 8px; align-items: flex-end; width: 100%;">
        <button class="attach-btn-mobile" onclick="openMobileLibrarianFileDialog()" title="Attach file">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events: none;">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <textarea id="response-input" placeholder="Type your response..." rows="3" style="flex: 1;"></textarea>
        <button class="send-btn" onclick="sendResponse()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Notification Badge -->
  <div class="notification-badge" id="notification-badge" style="display: none;">
    <span id="notification-count">0</span>
  </div>

  <script src="librarian-mobile.js?v=2"></script>

  <!-- Theme Toggle Button -->
  <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    ☀️
  </button>

  <script>
    // Theme Toggle Functionality
    function toggleTheme() {
      const body = document.body;
      const currentTheme = body.classList.contains('dark-mode') ? 'dark' : 'light';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      if (newTheme === 'dark') {
        body.classList.add('dark-mode');
      } else {
        body.classList.remove('dark-mode');
      }
      
      // Save preference
      localStorage.setItem('mobileTheme', newTheme);
      
      // Update toggle icon
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const themeToggle = document.getElementById('theme-toggle');
      const isDark = document.body.classList.contains('dark-mode');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
    }

    // Load saved theme on page load
    function loadTheme() {
      const savedTheme = localStorage.getItem('mobileTheme') || 'light';
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      }
      updateThemeIcon();
    }

    // Initialize theme
    loadTheme();

    // Mobile Login functionality
    (function initMobileLogin() {
      const loginScreen = document.getElementById('mobile-login-screen');
      const dashboardContent = document.getElementById('mobile-dashboard-content');
      const loginForm = document.getElementById('mobile-login-form');
      const loginError = document.getElementById('mobile-login-error');
      const usernameInput = document.getElementById('mobile-username');
      const passwordInput = document.getElementById('mobile-password');

      if (!loginForm) return;

      // Check if already logged in
      if (sessionStorage.getItem('mobileLibrarianLoggedIn') === 'true') {
        showDashboard();
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username) {
          showError('Please enter your name');
          return;
        }

        try {
          const response = await fetch('/api/librarian/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
          });

          const data = await response.json();

          if (data.success) {
            sessionStorage.setItem('mobileLibrarianLoggedIn', 'true');
            sessionStorage.setItem('mobileLibrarianUsername', username);
            showDashboard();
          } else {
            showError('Invalid password');
          }
        } catch (error) {
          showError('Login failed. Please try again.');
        }
      });

      function showDashboard() {
        loginScreen.style.display = 'none';
        dashboardContent.style.display = 'block';
      }

      function showError(message) {
        loginError.textContent = message;
        loginError.style.display = 'block';
        setTimeout(() => {
          loginError.style.display = 'none';
        }, 3000);
      }
    })();
  </script>

  </div><!-- End mobile-dashboard-content -->

</body>
</html>
