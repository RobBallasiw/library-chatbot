<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Assistant</title>
  <link rel="stylesheet" href="style.css?v=20240309">
</head>
<body>
  <!-- Your library website content goes here -->
  <div class="page-content">
    <h1>Welcome to the Library</h1>
    <p>Browse our collection, check hours, and more...</p>
    <p><a href="/privacy-policy.html">Privacy Policy</a> | <a href="/terms-of-service.html">Terms of Service</a></p>
  </div>

  <!-- Floating Chat Widget -->
  <div id="chat-widget" class="chat-widget open">
    <div class="chat-header">
      <div class="header-content">
        <span class="bot-avatar">📚</span>
        <div>
          <h3>Library Assistant</h3>
          <span class="status"><span class="status-dot"></span>AI Assistant</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button id="close-chat" class="close-btn" aria-label="Close chat">✕</button>
      </div>
    </div>
    
    <div id="chat-container" class="drop-zone">
      <div id="messages"></div>
      <div id="drop-overlay" class="drop-overlay" style="display: none;">
        <div class="drop-overlay-content">
          <span class="drop-icon">📎</span>
          <p>Drop your file here</p>
        </div>
      </div>
    </div>
    
    <!-- Quick Reply Buttons -->
    <div id="quick-replies" class="quick-replies">
      <button class="quick-reply-btn" data-message="What are the library hours?">📅 Library Hours</button>
      <button class="quick-reply-btn" data-message="How do I borrow a book?">📚 Borrow Books</button>
      <button class="quick-reply-btn" data-message="Can I book a study room?">🚪 Book a Room</button>
      <button class="quick-reply-btn" data-message="How do I renew my books?">🔄 Renew Books</button>
    </div>
    
    <div class="action-bar">
      <button id="request-librarian" class="librarian-btn" aria-label="Talk to librarian">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Talk to Librarian
      </button>
      <button id="new-chat-btn" class="librarian-btn" style="display: none; background: #667eea; color: white; border-color: #667eea;" aria-label="Start new chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Start New Chat
      </button>
    </div>
    
    <!-- Typing Preview -->
    <div id="typing-preview" class="typing-preview" style="display: none;">
      <span class="typing-preview-text"></span>
      <span class="typing-preview-hint">Press Enter to send</span>
    </div>
    
    <div class="input-area">
      <input 
        type="file" 
        id="file-input" 
        accept="image/*,.pdf,.doc,.docx"
        style="display: none;"
        aria-label="Upload file"
      >
      <button id="attach-btn" class="attach-btn" aria-label="Attach file">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events: none;">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input 
        type="text" 
        id="user-input" 
        placeholder="Type your question..."
        aria-label="Chat input"
      >
      <button id="send-btn" aria-label="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
    
    <!-- File Preview -->
    <div id="file-preview" class="file-preview" style="display: none;">
      <div class="file-preview-content">
        <img id="file-preview-img" style="display: none;" alt="File preview">
        <div id="file-preview-info" class="file-info">
          <span class="file-icon">📄</span>
          <span class="file-name"></span>
          <span class="file-size"></span>
        </div>
        <button id="remove-file-btn" class="remove-file-btn" aria-label="Remove file">×</button>
      </div>
    </div>
  </div>

  <!-- Chat Toggle Button -->
  <button id="chat-toggle" class="chat-toggle hidden" aria-label="Open chat">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span class="notification-badge">1</span>
  </button>

  <!-- Feedback Modal -->
  <div id="feedback-modal" class="feedback-modal">
    <div class="feedback-modal-content">
      <div class="feedback-modal-header">
        <h3>Rate Your Experience</h3>
        <button class="feedback-close-btn" onclick="closeFeedbackModal()">×</button>
      </div>
      <div class="feedback-modal-body">
        <p>How was your experience with the library assistant?</p>
        <div class="star-rating">
          <span class="star" data-rating="1">★</span>
          <span class="star" data-rating="2">★</span>
          <span class="star" data-rating="3">★</span>
          <span class="star" data-rating="4">★</span>
          <span class="star" data-rating="5">★</span>
        </div>
        <textarea id="feedback-comment" placeholder="Any additional comments? (optional)" rows="4"></textarea>
        <div class="feedback-actions">
          <button class="feedback-skip-btn" onclick="closeFeedbackModal()">Skip</button>
          <button class="feedback-submit-btn" onclick="submitFeedback()">Submit Feedback</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="script.js?v=20240308"></script>
</body>
</html>
